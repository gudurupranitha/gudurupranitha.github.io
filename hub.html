<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="dark light" />
  <title>Your Gift</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-page="hub">
  <canvas id="fx" aria-hidden="true"></canvas>

  <header class="topbar">
    <a class="brand" href="index.html" aria-label="Home">🎁 Birthday Special</a>
  </header>

  <main class="page">
    <section class="screen" aria-label="Gift hub">
      <div class="heroCard heroCenter">
        <p class="eyebrow">Made just for you</p>
        <h1 class="heroTitle">Pick one</h1>
        <p class="sub">Four little surprises — tap an icon to open.</p>
      </div>

      <div class="iconGrid" aria-label="Surprise options">
        <a class="iconCard" href="gallery.html" aria-label="Open camera gallery">
          <img class="iconImg" alt="Camera" src="https://media4.giphy.com/media/v1.Y2lkPTc5MGI3NjExdHVodjRxeHI1djBieDZ2OWwxbng2d3BvdXNuM2g5cHZmM2Vtb2FnYyZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/lPSNgTrRh0rtGxpLLE/giphy.gif" />

        </a>
        <a class="iconCard" href="letter.html" aria-label="Open love letter">
          <img class="iconImg" alt="Letter" src="https://media2.giphy.com/media/v1.Y2lkPTc5MGI3NjExMHU1NzhkMTRqcG0xcHBqMnMzbHdqNmF1M3RoOWwyOHpya2J0ZHN3NCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/cJHAJn3dPZlpTFjDV0/giphy.gif" />

        </a>
        <a class="iconCard" href="unlock.html" aria-label="Open love coupons">

          <div class="iconLabel">Love Coupons</div>
        </a>
        <a class="iconCard" href="cake.html" aria-label="Open cake">
          <img class="iconImg" alt="Cake" src="https://media0.giphy.com/media/v1.Y2lkPTc5MGI3NjExMDJndnlyNnlnNDY1ZjZvajJqMDEyc2ViYm5wcTN1MThzem0yODllbSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/8j1m96ZjFxfaZVq0bW/giphy.gif" />

        </a>

      <footer class="footer">
        <p>Made with ❤️ </p>
