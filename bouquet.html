<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="dark light" />
  <title>Bouquet</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-page="bouquet">
  <canvas id="fx" aria-hidden="true"></canvas>

  <header class="topbar">
    <a class="brand" href="hub.html" aria-label="Back to gift hub">← Back</a>
  </header>

  <main class="page">
    <section class="screen" aria-label="Bouquet">
      <div class="heroCard heroCenter">
        <p class="eyebrow">Bouquet</p>
        <h1 class="heroTitle">A bouquet just for you</h1>
        <p class="sub">Not real flowers… but real feelings.</p>
      </div>

      <div class="bouquetWrap" aria-label="Bouquet card">
        <div class="bouquetCard">
          <div class="bouquetBubbles" id="bouquetBubbles"></div>
          <div class="bouquetArt" id="bouquetArt" aria-hidden="true"></div>
          <div class="bouquetCaption">Happy Birthday, my love</div>
        </div>
      </div>

      <div class="bottomBar">
        <a class="btn" href="hub.html">Back</a>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
